spring:
  application:
    name: spring-ai-rag-hub
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ragdb}
    username: ${DB_USERNAME:raguser}
    password: ${DB_PASSWORD:ragpass}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536
  lifecycle:
    timeout-per-shutdown-phase: 30s

rag:
  provider: ${RAG_PROVIDER:openai}
  api-key: ${RAG_API_KEY:}
  registration-enabled: ${RAG_REGISTRATION_ENABLED:false}
  rate-limit:
    requests-per-minute: ${RAG_RATE_LIMIT:20}
  splitter:
    chunk-size: ${RAG_CHUNK_SIZE:512}
    chunk-overlap: ${RAG_CHUNK_OVERLAP:64}
    min-chunk-size: ${RAG_MIN_CHUNK_SIZE:5}
    max-num-chunks: ${RAG_MAX_NUM_CHUNKS:10000}
  llm:
    timeout-seconds: ${RAG_LLM_TIMEOUT:30}
  query-rewrite:
    enabled: ${RAG_QUERY_REWRITE:true}

management:
  tracing:
    sampling:
      probability: 1.0
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

server:
  port: 8080
  shutdown: graceful
  # Enable virtual threads when running on Java 21+; no-op on Java 17
  tomcat:
    threads:
      virtual:
        enabled: ${VIRTUAL_THREADS_ENABLED:false}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
