spring:
  application:
    name: spring-ai-rag-hub
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ragdb}
    username: ${DB_USERNAME:raguser}
    password: ${DB_PASSWORD:ragpass}
  ai:
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o}
    anthropic:
      base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.2}

rag:
  provider: ${RAG_PROVIDER:openai}
  api-key: ${RAG_API_KEY:}
  rate-limit:
    requests-per-minute: ${RAG_RATE_LIMIT:20}
  splitter:
    chunk-size: ${RAG_CHUNK_SIZE:512}
    chunk-overlap: ${RAG_CHUNK_OVERLAP:64}
    min-chunk-size: ${RAG_MIN_CHUNK_SIZE:5}
    max-num-chunks: ${RAG_MAX_NUM_CHUNKS:10000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

server:
  port: 8080
